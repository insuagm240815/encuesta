{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;">
  <div class="card">
    <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem;text-align:center;">🔒 Cambiar contraseña</h1>
    <p class="text-muted" style="text-align:center;margin-bottom:1.5rem;">
      Es tu primer ingreso. Por seguridad, establecé una contraseña personal.
    </p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" name="nueva" required minlength="6" placeholder="Mínimo 6 caracteres" autofocus>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" name="confirmar" required minlength="6" placeholder="Repetí la contraseña">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Guardar y continuar →</button>
    </form>
  </div>
</div>
{% endblock %}
