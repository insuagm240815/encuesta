{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <div class="card">
    <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;text-align:center;">📋 Sistema de Encuestas</h1>
    <form method="POST">
      <div class="form-group">
        <label>Unidad Funcional (UF)</label>
        <input type="text" name="documento" required autofocus placeholder="Ej: 0388 o 0388-INQ">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="Contraseña">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Ingresar</button>
    </form>
    <p class="text-muted mt-2" style="text-align:center;">La contraseña por defecto es tu UF.</p>
  </div>
</div>
{% endblock %}
