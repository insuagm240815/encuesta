{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <div class="card">
    <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;text-align:center;">📋 Sistema de Encuestas</h1>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Unidad Funcional (UF)</label>
        <input type="text" name="documento" required autofocus placeholder="Ej: 2899" style="font-size:1.1rem;padding:.65rem .75rem;">
        <p style="font-size:.78rem;color:var(--text-muted);margin-top:.4rem;">Por ej.: 2899 o 2899-INQ si sos inquilino</p>
      </div>
      {% if is_admin_attempt %}
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="Contraseña de administrador">
      </div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;padding:.7rem;">Ingresar →</button>
    </form>
  </div>
</div>
{% endblock %}
